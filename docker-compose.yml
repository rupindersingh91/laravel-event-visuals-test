services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - sqlite:/var/lib/sqlite      # ← DB lives here, off the Windows mount
    ports:
      - "8000:8000"
      - "5173:5173"
    command: sleep infinity

volumes:
  sqlite: